name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: |
          GRADLE_VERSION=8.5
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          ./gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
          rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK exists
        run: |
          ls -la app/build/outputs/apk/debug/
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK found at: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Get version info
        id: version
        run: |
          VERSION_NAME="1.0.0"
          BUILD_NUM=$(date +%Y%m%d%H%M%S)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "build_num=${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-${BUILD_NUM}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Booru Client ${{ steps.version.outputs.tag }}"
          body: |
            ## Booru Client - Android APK

            **Version:** ${{ steps.version.outputs.version_name }}
            **Build:** ${{ steps.version.outputs.build_num }}
            **Commit:** ${{ github.sha }}

            ### Features
            - Claymorphism / Soft UI design
            - Island floating header
            - Core circular action button
            - Gelbooru WebView scraper (anti-API)
            - Hidden content toggle
            - Fluid scroll post grid
            - Safe-area constrained layout

            ### Install
            Download the APK below and install on your Android device (min SDK 26).
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
